name: ZMK Firmware Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build ZMK Firmware
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Build firmware using the ZMK GitHub Action
      - name: Build ZMK Firmware
        uses: zmkfirmware/zmk-build-action@v1
        with:
          board: nice_nano_v2
          shield: corne
